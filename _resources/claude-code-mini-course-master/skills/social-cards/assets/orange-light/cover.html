<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Cover — Orange Light</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .card {
    width: 1080px;
    height: 1350px;
    background: #fff;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  /* 頂部淡橘色薄紗 */
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 600px;
    background: linear-gradient(180deg, rgba(231,155,80,0.22) 0%, rgba(231,155,80,0.06) 65%, transparent 100%);
    pointer-events: none;
  }
  /* 格紋紋理 */
  .card::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .title {
    font-weight: 900;
    font-size: 88px;
    color: #E27F2E;
    text-align: center;
    line-height: 1.35;
    margin-bottom: 36px;
  }
  .divider {
    width: 80px;
    height: 5px;
    background: #E27F2E;
    border-radius: 3px;
    margin-bottom: 40px;
  }
  .subtitle {
    font-weight: 500;
    font-size: 44px;
    color: #40444D;
    text-align: center;
    line-height: 1.6;
    padding: 0 100px;
  }
  .handle {
    position: absolute;
    bottom: 72px;
    left: 90px;
    font-family: 'Inter', sans-serif;
    font-size: 33px;
    font-weight: 600;
    color: rgba(0,0,0,0.25);
  }
</style>
</head>
<body>
<div class="card">
  <h1 class="title">標題標題<br>標題標題標題標題</h1>
  <div class="divider"></div>
  <p class="subtitle">副標題副標題副標題副標題<br>副標題副標題副標題</p>
  <span class="handle">@raymond0917</span>
</div>
</body>
</html>
