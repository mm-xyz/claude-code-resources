<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Content Image — Orange Light</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .card {
    width: 1080px;
    height: 1350px;
    background: #F6F7F8;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
  }
  /* 頂部橘色色塊（居中） */
  .deco-bar {
    position: absolute;
    top: 0;
    left: 227px;
    width: 636px;
    height: 18px;
    background: #E27F2E;
  }
  .title {
    position: absolute;
    top: 107px;
    left: 83px;
    right: 83px;
    font-size: 72px;
    font-weight: 900;
    color: #E27F2E;
    line-height: 1.4;
    text-align: center;
  }
  .description {
    position: absolute;
    top: 253px;
    left: 103px;
    right: 103px;
    font-size: 44px;
    font-weight: 500;
    color: #40444D;
    line-height: 1.6;
    text-align: center;
  }
  .image-area {
    position: absolute;
    top: 590px;
    left: 83px;
    right: 83px;
    height: 519px;
    background: #D9D9D9;
    border-radius: 17px;
    overflow: hidden;
    box-shadow: 0px 22px 22px 12px rgba(200, 200, 200, 0.25);
  }
  .image-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .handle {
    position: absolute;
    bottom: 72px;
    left: 90px;
    font-family: 'Inter', sans-serif;
    font-size: 33px;
    font-weight: 600;
    color: rgba(0,0,0,0.25);
  }
</style>
</head>
<body>
<div class="card">
  <div class="deco-bar"></div>
  <h2 class="title">標題標題標題標題標題</h2>
  <p class="description">內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文</p>
  <div class="image-area">
    <!-- 替換為 <img src="your-screenshot.png"> -->
  </div>
  <span class="handle">@raymond0917</span>
</div>
</body>
</html>
