<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Content Image — Blue Dark</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  .card {
    width: 1080px;
    height: 1350px;
    background:
      radial-gradient(ellipse 900px 900px at 100% 0%, #0A2A35 0%, transparent 70%),
      radial-gradient(circle 1200px at -10% 105%, #4AB897 0%, rgba(74,184,151,0.5) 25%, rgba(74,184,151,0.15) 50%, transparent 75%),
      #01101A;
    position: relative;
    overflow: hidden;
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
    padding: 80px 90px;
    display: flex;
    flex-direction: column;
  }
  .title {
    font-weight: 900;
    font-size: 72px;
    color: #fff;
    line-height: 1.3;
    margin-bottom: 28px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .description {
    font-weight: 500;
    font-size: 44px;
    color: rgba(255,255,255,0.65);
    line-height: 1.6;
    margin-bottom: 48px;
  }
  .image-area {
    flex: 1;
    background: #D9D9D9;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .image-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .handle {
    position: absolute;
    bottom: 72px;
    left: 90px;
    font-family: 'Inter', sans-serif;
    font-size: 33px;
    font-weight: 600;
    color: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
<div class="card">
  <h2 class="title">標題標題標題標題標題</h2>
  <p class="description">內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文內文</p>
  <div class="image-area">
    <!-- 替換為 <img src="your-screenshot.png"> -->
  </div>
  <span class="handle">@raymond0917</span>
</div>
</body>
</html>
